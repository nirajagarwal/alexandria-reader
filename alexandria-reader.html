<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexandria Press Reader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Crimson Pro', 'Garamond', serif;
            background: linear-gradient(135deg, #2d1810 0%, #1a0f08 100%);
            min-height: 100vh;
            height: 100vh;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .reader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .controls {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px;
            border-radius: 8px;
            width: 100%;
            max-width: 1200px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            flex-shrink: 0;
        }

        .controls h2 {
            margin-bottom: 10px;
            color: #2d1810;
            font-size: 1.2em;
        }

        .control-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .control-group {
            flex: 1;
            min-width: 180px;
            margin-bottom: 10px;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #4a2c1a;
            font-size: 0.9em;
        }

        select, input[type="range"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        .range-value {
            display: inline-block;
            margin-left: 10px;
            color: #666;
            font-weight: 600;
        }

        .book-wrapper {
            perspective: 2000px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            width: 100%;
            min-height: 0;
        }

        #book {
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(0, 0, 0, 0.1);
        }

        .page {
            padding: 60px 50px;
            background: #f4f1e8;
            overflow: hidden;
            position: relative;
            backface-visibility: visible;
        }

        /* Hide pages that aren't part of the current spread or animation */
        #book .stf__item:not(.--active):not(.--flipping) {
            visibility: hidden;
        }

        /* Ensure proper stacking */
        #book .stf__wrapper {
            background: #f4f1e8;
            isolation: isolate;
        }
        
        /* Make sure flipping pages stay on top */
        #book .stf__item.--flipping {
            z-index: 100 !important;
        }

        /* Canvas for paper texture */
        .paper-texture {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.8;
            mix-blend-mode: multiply;
        }

        .page-content {
            position: relative;
            z-index: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .publisher {
            text-align: center;
            font-size: 0.85em;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 40px;
            opacity: 0.7;
            font-weight: 600;
        }

        .chapter-title {
            font-size: 1.6em;
            margin-bottom: 30px;
            font-weight: 700;
            line-height: 1.3;
            text-align: center;
        }

        .section-title {
            font-size: 1.2em;
            margin-bottom: 20px;
            margin-top: 30px;
            font-weight: 600;
        }

        .body-text {
            font-size: 1.1em;
            line-height: 1.7;
            text-align: justify;
            hyphens: auto;
            flex: 1;
        }

        .body-text p {
            margin-bottom: 1em;
            text-indent: 2em;
        }

        .body-text p:first-child,
        .section-title + p {
            text-indent: 0;
        }

        .body-text p:first-of-type::first-letter {
            font-size: 3em;
            line-height: 0.9;
            float: left;
            margin: 0.05em 0.1em 0 0;
            font-weight: 700;
        }

        .page-number {
            position: absolute;
            bottom: 30px;
            font-size: 0.85em;
            opacity: 0.6;
        }

        .page-number.left {
            left: 50px;
        }

        .page-number.right {
            right: 50px;
        }

        /* Ink rendering */
        .ink-render {
            filter: url(#ink-filter);
        }

        .navigation {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-top: 20px;
        }

        .nav-button {
            padding: 10px 20px;
            background: #4a2c1a;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Crimson Pro', serif;
            font-size: 1em;
            font-weight: 600;
            transition: background 0.2s;
        }

        .nav-button:hover:not(:disabled) {
            background: #6b4028;
        }

        .nav-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-info {
            color: #4a2c1a;
            font-weight: 600;
        }

        .cover {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px 60px;
            background: linear-gradient(135deg, #2d1810 0%, #1a0f08 100%);
            color: #f4f1e8;
        }

        .cover-title {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.2;
        }

        .cover-subtitle {
            font-size: 1.3em;
            margin-bottom: 40px;
            opacity: 0.8;
            text-align: center;
        }

        .cover-publisher {
            font-size: 0.9em;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: auto;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="reader-container">
        <div class="controls">
            <h2>Alexandria Press Reader</h2>
            
            <div class="control-row">
                <div class="control-group">
                    <label for="paperType">Paper Type:</label>
                    <select id="paperType">
                        <option value="cream">Classic Book Paper</option>
                        <option value="smooth">Modern Premium</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="inkDensity">Ink Density: <span class="range-value" id="inkDensityValue">0.75</span></label>
                    <input type="range" id="inkDensity" min="0.6" max="1.0" step="0.05" value="0.75">
                </div>

                <div class="control-group">
                    <label for="textureIntensity">Paper Roughness: <span class="range-value" id="textureIntensityValue">0.015</span></label>
                    <input type="range" id="textureIntensity" min="0.0" max="0.2" step="0.01" value="0.015">
                </div>

                <div class="control-group">
                    <label for="flocculation">Flocculation: <span class="range-value" id="flocculationValue">0.50</span></label>
                    <input type="range" id="flocculation" min="0.0" max="1.0" step="0.05" value="0.50">
                </div>
            </div>

            <div class="navigation">
                <button class="nav-button" id="prevBtn">← Previous</button>
                <span class="page-info" id="pageInfo">Page 1 of 10</span>
                <button class="nav-button" id="nextBtn">Next →</button>
                <button class="nav-button" id="refreshBtn" style="margin-left: auto;">Refresh Textures</button>
            </div>
        </div>

        <div class="book-wrapper">
            <div id="book"></div>
        </div>
    </div>

    <!-- SVG filters for ink rendering -->
    <svg style="position: absolute; width: 0; height: 0;">
        <defs>
            <filter id="ink-filter">
                <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" seed="1" result="noise"/>
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.3" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
                <feComponentTransfer in="displaced" result="darker">
                    <feFuncA type="linear" slope="1.1"/>
                </feComponentTransfer>
                <feTurbulence type="turbulence" baseFrequency="2" numOctaves="2" seed="2" result="texture"/>
                <feColorMatrix in="texture" type="saturate" values="0" result="graytexture"/>
                <feComponentTransfer in="graytexture" result="thresholdTexture">
                    <feFuncA type="discrete" tableValues="0 0.5 0.8 1"/>
                </feComponentTransfer>
                <feBlend in="darker" in2="thresholdTexture" mode="multiply"/>
            </filter>
        </defs>
    </svg>

    <script>
        // Load book data from JSON
        let bookData = null;
        
        fetch('/mnt/user-data/uploads/book.json')
            .then(response => response.json())
            .then(data => {
                bookData = data;
                initializeBook();
            })
            .catch(error => {
                console.error('Error loading book:', error);
                document.getElementById('book').innerHTML = '<p style="padding: 40px; text-align: center;">Error loading book content. Please check that book.json is available.</p>';
            });

        // Convert markdown-style content to HTML paragraphs
        function formatContent(markdown) {
            // Simple markdown processing
            let html = markdown
                // Remove title (already displayed separately)
                .replace(/^# .+\n\n?/, '')
                // Convert ## headings to section titles
                .replace(/## (.+)/g, '<div class="section-title">$1</div>')
                // Convert remaining # headings
                .replace(/# (.+)/g, '<div class="section-title">$1</div>')
                // Split into paragraphs
                .split('\n\n')
                .filter(p => p.trim() && !p.startsWith('<div class="section-title">'))
                .map(p => `<p>${p.trim()}</p>`)
                .join('\n');
            
            return html;
        }

        // Paginate content intelligently
        function paginateEntry(entry, maxCharsPerPage = 1800) {
            const formatted = formatContent(entry.content);
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = formatted;
            
            const elements = Array.from(tempDiv.children);
            const pages = [];
            let currentPage = [];
            let currentLength = 0;
            
            for (const el of elements) {
                const textLength = el.textContent.length;
                
                // If adding this element would exceed max, start new page
                if (currentLength + textLength > maxCharsPerPage && currentPage.length > 0) {
                    pages.push(currentPage.join('\n'));
                    currentPage = [el.outerHTML];
                    currentLength = textLength;
                } else {
                    currentPage.push(el.outerHTML);
                    currentLength += textLength;
                }
            }
            
            // Add remaining content
            if (currentPage.length > 0) {
                pages.push(currentPage.join('\n'));
            }
            
            return pages;
        }

        // Build book pages from JSON data
        function buildBookPages() {
            if (!bookData) return [];
            
            const pages = [];
            
            // Front cover
            pages.push({
                type: 'cover',
                content: `
                    <div class="cover">
                        <div class="cover-title">${bookData.title}</div>
                        <div class="cover-subtitle">${bookData.descriptor}</div>
                        <div class="cover-publisher">Alexandria Press</div>
                    </div>
                `
            });
            
            // Introduction (paginate if needed)
            if (bookData.introduction) {
                const introParagraphs = bookData.introduction.split('\n\n').map(p => `<p>${p}</p>`).join('\n');
                const introPages = paginateEntry({content: `# Introduction\n\n${bookData.introduction}`}, 1600);
                
                introPages.forEach((pageContent, index) => {
                    pages.push({
                        title: index === 0 ? 'Introduction' : null,
                        content: pageContent,
                        pageNum: pages.length
                    });
                });
            }
            
            // Each entry (virtue)
            bookData.entries.forEach((entry, entryIndex) => {
                const entryPages = paginateEntry(entry, 1700);
                
                entryPages.forEach((pageContent, pageIndex) => {
                    pages.push({
                        title: pageIndex === 0 ? entry.name : null,
                        section: pageIndex === 0 ? entry.section : null,
                        content: pageContent,
                        pageNum: pages.length
                    });
                });
            });
            
            // Back cover
            pages.push({
                type: 'cover',
                content: `
                    <div class="cover">
                        <div class="cover-publisher" style="margin-top: 0; margin-bottom: auto;">Alexandria Press</div>
                        <div style="text-align: center; opacity: 0.8; line-height: 1.6; font-size: 0.95em;">
                            <p>Exploring character through the classical virtues</p>
                            <p style="margin-top: 20px; font-size: 0.85em;">Generated by artificial intelligence<br>in conversation with humanity's wisdom</p>
                        </div>
                    </div>
                `
            });
            
            return pages;
        }

        // Paper texture generator (same as before)
        class PaperTextureGenerator {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
            }

            generate(type, intensity, flocculation) {
                const startTime = performance.now();
                
                const rect = this.canvas.parentElement.getBoundingClientRect();
                this.canvas.width = rect.width;
                this.canvas.height = rect.height;

                const { width, height } = this.canvas;
                const imageData = this.ctx.createImageData(width, height);
                const data = imageData.data;

                const paperColors = {
                    cream: { r: 244, g: 241, b: 232 },
                    smooth: { r: 252, g: 252, b: 250 }
                };

                const baseColor = paperColors[type] || paperColors.cream;
                const scaledIntensity = intensity * 5;

                const heightMap = new Float32Array(width * height);
                
                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        const index = y * width + x;
                        const noise1 = this.noise(x * 0.02, y * 0.02);
                        const noise2 = this.noise(x * 0.08, y * 0.08) * 0.5;
                        const noise3 = this.noise(x * 0.3, y * 0.3) * 0.25;
                        const grain = (Math.random() - 0.5) * 0.1;
                        const intensityFactor = Math.sqrt(scaledIntensity);
                        heightMap[index] = (noise1 + noise2 + noise3 + grain) * intensityFactor;
                    }
                }

                const lightAngle = Math.PI / 4;
                const lightX = Math.cos(lightAngle);
                const lightY = Math.sin(lightAngle);
                const heightScale = (10 + scaledIntensity * 40);
                
                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        const index = (y * width + x) * 4;
                        const heightIndex = y * width + x;
                        
                        const heightL = x > 0 ? heightMap[heightIndex - 1] : heightMap[heightIndex];
                        const heightR = x < width - 1 ? heightMap[heightIndex + 1] : heightMap[heightIndex];
                        const heightU = y > 0 ? heightMap[heightIndex - width] : heightMap[heightIndex];
                        const heightD = y < height - 1 ? heightMap[heightIndex + width] : heightMap[heightIndex];
                        
                        const dx = (heightR - heightL) * heightScale;
                        const dy = (heightD - heightU) * heightScale;
                        
                        const normalLength = Math.sqrt(dx * dx + dy * dy + 1);
                        const nx = -dx / normalLength;
                        const ny = -dy / normalLength;
                        const nz = 1 / normalLength;
                        
                        const lighting = Math.max(0, nx * lightX + ny * lightY + nz * 0.7);
                        const shade = (lighting - 0.5) * (8 + scaledIntensity * 15);
                        const colorVar = (Math.random() - 0.5) * 2;

                        data[index] = Math.min(255, Math.max(0, baseColor.r + shade + colorVar));
                        data[index + 1] = Math.min(255, Math.max(0, baseColor.g + shade + colorVar));
                        data[index + 2] = Math.min(255, Math.max(0, baseColor.b + shade + colorVar));
                        data[index + 3] = 255;
                    }
                }

                this.addPaperCharacteristics(data, width, height, type, scaledIntensity);

                if (flocculation > 0) {
                    for (let y = 0; y < height; y++) {
                        for (let x = 0; x < width; x++) {
                            const index = (y * width + x) * 4;
                            const flocNoise1 = this.noise(x * 0.008, y * 0.008) * 12;
                            const flocNoise2 = this.noise(x * 0.02, y * 0.02) * 6;
                            const flocNoise3 = this.noise(x * 0.05, y * 0.05) * 3;
                            const flocScale = Math.pow(flocculation, 0.8);
                            const flocEffect = (flocNoise1 + flocNoise2 + flocNoise3) * flocScale;
                            
                            data[index] = Math.min(255, Math.max(0, data[index] + flocEffect));
                            data[index + 1] = Math.min(255, Math.max(0, data[index + 1] + flocEffect));
                            data[index + 2] = Math.min(255, Math.max(0, data[index + 2] + flocEffect));
                        }
                    }
                }

                this.ctx.putImageData(imageData, 0, 0);
                return Math.round(performance.now() - startTime);
            }

            addPaperCharacteristics(data, width, height, type, intensity) {
                if (type === 'cream') {
                    for (let i = 0; i < 100; i++) {
                        const x = Math.random() * width;
                        const y = Math.random() * height;
                        const radius = Math.random() * 12 + 5;
                        const variation = (Math.random() - 0.5) * 15 * intensity;
                        this.addCircularVariation(data, width, height, x, y, radius, variation, 0.7);
                    }
                } else if (type === 'smooth') {
                    for (let y = 0; y < height; y += 2) {
                        for (let x = 0; x < width; x += 2) {
                            const index = (y * width + x) * 4;
                            const microGrain = (Math.random() - 0.5) * 2 * intensity;
                            if (index < data.length) {
                                data[index] = Math.min(255, Math.max(0, data[index] + microGrain));
                                data[index + 1] = Math.min(255, Math.max(0, data[index + 1] + microGrain));
                                data[index + 2] = Math.min(255, Math.max(0, data[index + 2] + microGrain));
                            }
                        }
                    }
                }
            }

            addCircularVariation(data, width, height, cx, cy, radius, variation, intensity) {
                const minX = Math.max(0, Math.floor(cx - radius));
                const maxX = Math.min(width, Math.ceil(cx + radius));
                const minY = Math.max(0, Math.floor(cy - radius));
                const maxY = Math.min(height, Math.ceil(cy + radius));

                for (let y = minY; y < maxY; y++) {
                    for (let x = minX; x < maxX; x++) {
                        const dist = Math.sqrt((x - cx) ** 2 + (y - cy) ** 2);
                        if (dist < radius) {
                            const index = (y * width + x) * 4;
                            const factor = (1 - dist / radius) * variation * intensity;
                            data[index] = Math.max(0, Math.min(255, data[index] + factor));
                            data[index + 1] = Math.max(0, Math.min(255, data[index + 1] + factor));
                            data[index + 2] = Math.max(0, Math.min(255, data[index + 2] + factor));
                        }
                    }
                }
            }

            noise(x, y) {
                if (!this.permutation) {
                    this.initPerlin();
                }
                
                const X = Math.floor(x) & 255;
                const Y = Math.floor(y) & 255;
                x -= Math.floor(x);
                y -= Math.floor(y);
                const u = this.fade(x);
                const v = this.fade(y);
                const A = this.permutation[X] + Y;
                const AA = this.permutation[A];
                const AB = this.permutation[A + 1];
                const B = this.permutation[X + 1] + Y;
                const BA = this.permutation[B];
                const BB = this.permutation[B + 1];
                
                return this.lerp(v,
                    this.lerp(u, this.grad(this.permutation[AA], x, y),
                                 this.grad(this.permutation[BA], x - 1, y)),
                    this.lerp(u, this.grad(this.permutation[AB], x, y - 1),
                                 this.grad(this.permutation[BB], x - 1, y - 1))
                );
            }
            
            initPerlin() {
                const p = [];
                for (let i = 0; i < 256; i++) p[i] = i;
                for (let i = 255; i > 0; i--) {
                    const n = Math.floor(Math.random() * (i + 1));
                    [p[i], p[n]] = [p[n], p[i]];
                }
                this.permutation = new Array(512);
                for (let i = 0; i < 512; i++) {
                    this.permutation[i] = p[i & 255];
                }
            }
            
            fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
            lerp(t, a, b) { return a + t * (b - a); }
            grad(hash, x, y) {
                const h = hash & 15;
                const u = h < 8 ? x : y;
                const v = h < 4 ? y : h === 12 || h === 14 ? x : 0;
                return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
            }
        }

        // Initialize page flip
        let pageFlip;
        let currentSettings = {
            paperType: 'cream',
            inkDensity: 0.75,
            textureIntensity: 0.015,
            flocculation: 0.50
        };

        function initializeBook() {
            // Check if StPageFlip loaded
            if (typeof St === 'undefined' || typeof St.PageFlip === 'undefined') {
                console.error('StPageFlip library failed to load');
                document.getElementById('book').innerHTML = '<p style="padding: 40px; text-align: center;">Error loading page flip library. Please refresh the page.</p>';
                return;
            }
            
            try {
                const bookPages = buildBookPages();
                console.log(`Building book with ${bookPages.length} pages`);
                
                const bookContainer = document.getElementById('book');
            
                // Create page elements
                bookPages.forEach((pageData, index) => {
                const pageDiv = document.createElement('div');
                pageDiv.className = 'page';
                pageDiv.setAttribute('data-density', 'hard');
                
                // Add canvas for texture
                const canvas = document.createElement('canvas');
                canvas.className = 'paper-texture';
                pageDiv.appendChild(canvas);
                
                // Add content
                const contentDiv = document.createElement('div');
                contentDiv.className = 'page-content ink-render';
                
                if (pageData.type === 'cover') {
                    contentDiv.innerHTML = pageData.content;
                } else {
                    let html = '<div class="publisher">Alexandria Press</div>';
                    if (pageData.title) {
                        html += `<div class="chapter-title">${pageData.title}</div>`;
                    }
                    if (pageData.sectionTitle) {
                        html += `<div class="section-title">${pageData.sectionTitle}</div>`;
                    }
                    html += `<div class="body-text">${pageData.content}</div>`;
                    if (pageData.pageNum) {
                        const pageNumClass = index % 2 === 0 ? 'right' : 'left';
                        html += `<div class="page-number ${pageNumClass}">${pageData.pageNum}</div>`;
                    }
                    contentDiv.innerHTML = html;
                }
                
                pageDiv.appendChild(contentDiv);
                bookContainer.appendChild(pageDiv);
            });

            // Initialize PageFlip
            pageFlip = new St.PageFlip(bookContainer, {
                width: 450,
                height: 600,
                size: 'fixed',
                minWidth: 315,
                maxWidth: 1000,
                minHeight: 420,
                maxHeight: 1350,
                showCover: true,
                flippingTime: 1000,
                usePortrait: false,
                startPage: 0,
                drawShadow: true,
                maxShadowOpacity: 0.5,
                mobileScrollSupport: false,
                swipeDistance: 30,
                clickEventForward: true,
                startZIndex: 100,
                disableFlipByClick: false
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.page'));

            // Event listeners for page flip
            pageFlip.on('flip', (e) => {
                updatePageInfo();
                updateNavButtons();
            });

            // Use ResizeObserver to detect when pages are actually sized
            const pages = document.querySelectorAll('.page');
            let pagesWithTexture = new Set();
            
            const observer = new ResizeObserver((entries) => {
                entries.forEach(entry => {
                    const page = entry.target;
                    const canvas = page.querySelector('.paper-texture');
                    
                    if (canvas && entry.contentRect.width > 0 && entry.contentRect.height > 0) {
                        const pageIndex = Array.from(pages).indexOf(page);
                        
                        if (!pagesWithTexture.has(pageIndex)) {
                            console.log(`Generating texture for page ${pageIndex}: ${entry.contentRect.width}x${entry.contentRect.height}`);
                            const generator = new PaperTextureGenerator(canvas);
                            generator.generate(
                                currentSettings.paperType,
                                currentSettings.textureIntensity,
                                currentSettings.flocculation
                            );
                            pagesWithTexture.add(pageIndex);
                        }
                    }
                });
                
                // Update ink density once
                if (pagesWithTexture.size > 0) {
                    const filter = document.getElementById('ink-filter');
                    if (filter) {
                        const funcA = filter.querySelector('feComponentTransfer feFuncA');
                        if (funcA) {
                            funcA.setAttribute('slope', currentSettings.inkDensity.toFixed(3));
                        }
                    }
                }
            });
            
            // Observe all pages
            pages.forEach(page => observer.observe(page));
            updatePageInfo();
            updateNavButtons();
            
            } catch (error) {
                console.error('Error initializing book:', error);
                document.getElementById('book').innerHTML = '<p style="padding: 40px; text-align: center;">Error initializing book: ' + error.message + '</p>';
            }
        }

        function updateAllTextures() {
            const pages = document.querySelectorAll('.page');
            let successCount = 0;
            
            pages.forEach((page, index) => {
                const canvas = page.querySelector('.paper-texture');
                if (canvas) {
                    // Force a check of current dimensions
                    const rect = page.getBoundingClientRect();
                    if (rect.width > 0 && rect.height > 0) {
                        console.log(`Regenerating texture for page ${index}: ${rect.width}x${rect.height}`);
                        const generator = new PaperTextureGenerator(canvas);
                        generator.generate(
                            currentSettings.paperType,
                            currentSettings.textureIntensity,
                            currentSettings.flocculation
                        );
                        successCount++;
                    } else {
                        console.warn(`Page ${index} has no dimensions: ${rect.width}x${rect.height}`);
                    }
                }
            });

            console.log(`Updated textures on ${successCount}/${pages.length} pages`);

            // Update ink density
            const filter = document.getElementById('ink-filter');
            if (filter) {
                const funcA = filter.querySelector('feComponentTransfer feFuncA');
                if (funcA) {
                    funcA.setAttribute('slope', currentSettings.inkDensity.toFixed(3));
                    console.log(`Set ink density to ${currentSettings.inkDensity}`);
                }
            }
        }

        function updatePageInfo() {
            if (!pageFlip) return;
            const current = pageFlip.getCurrentPageIndex();
            const total = pageFlip.getPageCount();
            document.getElementById('pageInfo').textContent = `Page ${current + 1} of ${total}`;
        }

        function updateNavButtons() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            prevBtn.disabled = pageFlip.getCurrentPageIndex() === 0;
            nextBtn.disabled = pageFlip.getCurrentPageIndex() >= pageFlip.getPageCount() - 1;
        }

        // Controls
        const paperType = document.getElementById('paperType');
        const inkDensity = document.getElementById('inkDensity');
        const textureIntensity = document.getElementById('textureIntensity');
        const flocculation = document.getElementById('flocculation');

        function updateSettings() {
            currentSettings = {
                paperType: paperType.value,
                inkDensity: parseFloat(inkDensity.value),
                textureIntensity: parseFloat(textureIntensity.value),
                flocculation: parseFloat(flocculation.value)
            };

            document.getElementById('inkDensityValue').textContent = currentSettings.inkDensity.toFixed(2);
            document.getElementById('textureIntensityValue').textContent = currentSettings.textureIntensity.toFixed(2);
            document.getElementById('flocculationValue').textContent = currentSettings.flocculation.toFixed(2);

            updateAllTextures();
        }

        paperType.addEventListener('change', () => {
            if (paperType.value === 'smooth') {
                textureIntensity.value = 0.02;
            } else {
                textureIntensity.value = 0.015;
            }
            updateSettings();
        });

        inkDensity.addEventListener('input', updateSettings);
        textureIntensity.addEventListener('input', updateSettings);
        flocculation.addEventListener('input', updateSettings);

        // Navigation
        document.getElementById('prevBtn').addEventListener('click', () => {
            pageFlip.flipPrev();
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            pageFlip.flipNext();
        });

        document.getElementById('refreshBtn').addEventListener('click', () => {
            console.log('Manual texture refresh triggered');
            updateAllTextures();
        });

        // Initialize on load - will be called after JSON loads
        window.addEventListener('DOMContentLoaded', () => {
            // If book data hasn't loaded yet, show loading message
            if (!bookData) {
                document.getElementById('book').innerHTML = '<p style="padding: 40px; text-align: center;">Loading book...</p>';
            }
        });
    </script>
</body>
</html>
