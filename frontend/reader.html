<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Alexandria Reader</title>
    <meta name="description" content="Read books from Alexandria Press in a beautiful, immersive reader.">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://alexandria.press/reader.html">
    <meta property="og:title" content="Alexandria Reader">
    <meta property="og:description" content="Read books from Alexandria Press in a beautiful, immersive reader.">
    <meta property="og:image" content="https://alexandria.press/assets/og-image.png">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://alexandria.press/reader.html">
    <meta name="twitter:title" content="Alexandria Reader">
    <meta name="twitter:description" content="Read books from Alexandria Press in a beautiful, immersive reader.">
    <meta name="twitter:image" content="https://alexandria.press/assets/og-image.png">

    <!-- Fonts (Synced with book.html) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Lora:ital,wght@0,400..700;1,400..700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- Styles (reader.css inherits vars from style.css typically, but we use a dedicated one) -->
    <link rel="stylesheet" href="css/reader.css?v=8">

    <!-- epub.js Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <!-- Paper Texture Generator -->
    <script src="js/texture.js"></script>

    <style>
        /* Responsive Viewer sizing */
        #viewer {
            background-color: var(--bg-primary);
            transition: none;
            /* No transition for layout stability */
        }

        /* Ensure toolbar syncs with system preference if reader.css doesn't cover it */
        /* Ensure toolbar syncs with system preference if reader.css doesn't cover it */
        .reader-toolbar {
            /* Styles moved to reader.css for transparency */
        }
    </style>
</head>

<body>
    <!-- Toolbar (Synced with book.html header) -->
    <nav class="reader-toolbar">
        <div class="reader-toolbar-controls">
            <!-- Left: Back to Library -->
            <div style="display: flex; align-items: center;">
                <a href="/" class="reader-tool-btn icon-only" id="backToLibrary" title="Back to Library">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7" />
                    </svg>
                </a>
                <span class="nav-book-title" id="bookTitle"></span>
            </div>

            <!-- Right: Pagination & Contents -->
            <div style="display: flex; align-items: center; gap: 10px;">
                <div class="reader-pagination">
                    <button id="prevBtn" class="reader-tool-btn icon-only" title="Previous Page">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </button>
                    <span id="pageProgress" class="reader-page-info">...</span>
                    <button id="nextBtn" class="reader-tool-btn icon-only" title="Next Page">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </button>
                </div>

                <button id="contentsTrigger" class="reader-tool-btn icon-only" title="Table of Contents">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="8" y1="6" x2="21" y2="6"></line>
                        <line x1="8" y1="12" x2="21" y2="12"></line>
                        <line x1="8" y1="18" x2="21" y2="18"></line>
                        <line x1="3" y1="6" x2="3.01" y2="6"></line>
                        <line x1="3" y1="12" x2="3.01" y2="12"></line>
                        <line x1="3" y1="18" x2="3.01" y2="18"></line>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Viewer -->
    <div id="viewer"></div>

    <!-- Paper Texture Overlay -->
    <canvas id="paperTexture" class="texture-overlay"></canvas>

    <!-- Loader -->
    <div id="loader" class="reader-loader">Initialising...</div>

    <!-- Contents Menu Overlay (Synced styles with book.html via style.css/reader specific css) -->
    <div class="contents-overlay hidden" id="contentsOverlay">
        <div class="contents-menu">
            <header class="contents-menu-header">
                <h2>Contents</h2>
                <button class="contents-close" id="contentsClose">×</button>
            </header>
            <nav class="contents-menu-links" id="contentsMenuLinks">
                <!-- Populated dynamically -->
            </nav>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const bookId = params.get('bookId');
            const href = params.get('href');

            if (!bookId) {
                window.location.href = '/';
                return;
            }

            const loader = document.getElementById('loader');
            const bookTitle = document.getElementById('bookTitle');
            const pageProgress = document.getElementById('pageProgress');

            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

            // 1. Initialize Book and Rendition
            const book = ePub(`/outputs/${bookId}/book.epub`);

            // Determine spread behavior: Always spread unless small screen
            const rendition = book.renderTo("viewer", {
                width: "100%",
                height: "100%",
                flow: "paginated",
                manager: "default",
                spread: "auto",
                minSpreadWidth: 700, // Widened threshold slightly to keep 2-page view longer
                allowScriptedContent: false
            });

            // 2. Theme Registration (Aligned with style.css)
            const lightColors = {
                bg: "transparent",
                text: "#1A1A1A",
                accent: "#D4AF37",
                mute: "#757575"
            };

            const darkColors = {
                bg: "transparent",
                text: "#F2F2F2",
                accent: "#D4AF37",
                mute: "#999999"
            };

            const colors = isDark ? darkColors : lightColors;

            rendition.themes.register("default", {
                "body": {
                    "background": colors.bg,
                    "color": colors.text,
                    "font-family": "'Lora', serif",
                    "font-size": "18px"
                },
                "h1": {
                    "font-family": "'Lora', serif",
                    "font-weight": "600",
                    "text-align": "left",
                    "color": isDark ? colors.accent : colors.text
                },
                "p": {
                    "line-height": "1.65",
                    "text-align": "justify",
                    "margin-bottom": "1.5rem"
                },
                "img": {
                    "max-width": "100%",
                    "filter": isDark ? "sepia(0.5) contrast(0.8) brightness(0.8)" : "none"
                },
                ".section-label": {
                    "font-family": "'IBM Plex Sans', sans-serif",
                    "font-weight": "600",
                    "font-size": "0.75rem",
                    "text-transform": "uppercase",
                    "color": colors.mute,
                    "letter-spacing": "0.15em",
                    "margin-top": "0",
                    "margin-bottom": "0.5rem"
                }
            });

            rendition.themes.select("default");

            // 3. Hooks
            rendition.hooks.content.register((contents) => {
                const doc = contents.document;
                contents.addStylesheet("https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=IBM+Plex+Sans:wght@400;600&display=swap");

                contents.addStylesheetRules({
                    "body": { "-webkit-font-smoothing": "antialiased" },
                    "p": { "text-indent": "0", "orphans": "2", "widows": "2" },
                    "p:first-of-type": { "text-indent": "0" },
                    "h1 + p": { "text-indent": "0" },
                    ".epubjs-content body": { "padding": "60px 80px !important" }
                });

                doc.body.classList.add('epubjs-content');
            });

            // 4. Navigation
            document.getElementById('prevBtn').onclick = () => rendition.prev();
            document.getElementById('nextBtn').onclick = () => rendition.next();

            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') rendition.prev();
                if (e.key === 'ArrowRight') rendition.next();
            });

            rendition.on('relocated', (location) => {
                console.log('Relocated:', location);
                console.log('atStart:', location.atStart, 'atEnd:', location.atEnd);

                // Update Progress
                if (book.locations && book.locations.percentageFromCfi) {
                    const percent = book.locations.percentageFromCfi(location.start.cfi);
                    const percentage = Math.floor(percent * 100);
                    pageProgress.textContent = (percentage > 0) ? `${percentage}%` : 'Reading';
                } else {
                    pageProgress.textContent = 'Reading';
                }

                // Update Buttons
                const prevBtn = document.getElementById('prevBtn');
                const nextBtn = document.getElementById('nextBtn');

                if (location.atStart) {
                    prevBtn.disabled = true;
                } else {
                    prevBtn.disabled = false;
                }

                if (location.atEnd) {
                    nextBtn.disabled = true;
                } else {
                    nextBtn.disabled = false;
                }
            });

            book.ready.then(() => {
                return book.locations.generate(1000);
            }).then(() => {
                console.log("Locations generated");
            });

            // 7. Initialization
            try {
                // Display at specific href if provided, else beginning
                await rendition.display(href || undefined);
                loader.style.display = 'none';

                book.loaded.metadata.then(meta => {
                    if (bookTitle) bookTitle.textContent = meta.title;
                    document.title = `${meta.title} - Alexandria Reader`;

                    // Update Back button to go to book detail
                    const backBtn = document.getElementById('backToLibrary');
                    backBtn.href = `/book.html?id=${bookId}`;

                    // Update Contents Menu Header
                    const menuHeader = document.querySelector('.contents-menu-header h2');
                    if (menuHeader) {
                        menuHeader.textContent = meta.title;
                        // Styling handled by CSS I added in reader.css
                    }
                });

                // Load Navigation
                book.loaded.navigation.then(nav => {
                    const menuLinks = document.getElementById('contentsMenuLinks');
                    let html = '<ul class="menu-list">';

                    nav.toc.forEach(chapter => {
                        html += `<li><a href="#" data-href="${chapter.href}">${chapter.label}</a></li>`;
                    });

                    html += '</ul>';
                    menuLinks.innerHTML = html;

                    // Bind clicks
                    menuLinks.querySelectorAll('a').forEach(link => {
                        link.onclick = (e) => {
                            e.preventDefault();
                            rendition.display(link.dataset.href);
                            closeMenu();
                        };
                    });
                });

                initTexture();
                initMenu();

            } catch (err) {
                console.error("Reader Error:", err);
                loader.textContent = "Error loading book: " + err.message;
            }

            // Listen for system theme changes and reload? 
            // Simple approach: user usually stays in one mode or reloads.
        });

        function initTexture() {
            const canvas = document.getElementById('paperTexture');
            const generator = new PaperTextureGenerator(canvas);

            function updateTexture() {
                const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

                // Settings based on mode
                const settings = isDark ? {
                    type: 'dark',
                    intensity: 0.15,
                    flocculation: 0.4
                } : {
                    type: 'cream',
                    intensity: 0.1,
                    flocculation: 0.8
                };

                // Debounce slightly to prevent blocking resize
                requestAnimationFrame(() => {
                    generator.generate(settings.type, settings.intensity, settings.flocculation);
                });
            }

            window.addEventListener('resize', updateTexture);
            updateTexture();
        }

        function initMenu() {
            const trigger = document.getElementById('contentsTrigger');
            const overlay = document.getElementById('contentsOverlay');
            const closeBtn = document.getElementById('contentsClose');

            function openMenu() {
                overlay.classList.remove('hidden');
            }

            function closeMenu() {
                overlay.classList.add('hidden');
            }

            trigger.onclick = openMenu;
            closeBtn.onclick = closeMenu;
            overlay.onclick = (e) => {
                if (e.target === overlay) closeMenu();
            };

            // Expose for global usage
            window.closeMenu = closeMenu;
        }

    </script>
</body>

</html>
