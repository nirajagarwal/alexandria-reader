<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found | Alexandria Press</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: var(--space-xl);
        }

        .error-code {
            font-family: var(--font-display);
            font-size: 8rem;
            font-weight: 900;
            color: var(--border);
            margin-bottom: -1rem;
        }

        .error-message {
            font-family: var(--font-serif);
            font-size: 1.5rem;
            margin-bottom: var(--space-2xl);
        }
    </style>
</head>

<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-message">This chapter has been lost to time.</h1>
        <a href="/" class="nav-btn">Return to Library</a>
    </div>
</body>

</html>
