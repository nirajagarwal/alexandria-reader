<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading... | Alexandria Press</title>
    <meta name="description" content="A book from Alexandria Press.">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="book">
    <meta property="og:url" content="https://alexandria.press/book.html">
    <meta property="og:title" content="Alexandria Press">
    <meta property="og:description" content="A book from Alexandria Press.">
    <meta property="og:image" content="https://alexandria.press/assets/og-image.png">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://alexandria.press/book.html">
    <meta name="twitter:title" content="Alexandria Press">
    <meta name="twitter:description" content="A book from Alexandria Press.">
    <meta name="twitter:image" content="https://alexandria.press/assets/og-image.png">

    <link rel="icon" href="assets/favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Lora:ital,wght@0,400..700;1,400..700&family=IBM+Plex+Sans:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="canonical" href="https://alexandria.press/book.html">
    <link rel="manifest" href="/manifest.json">
    <!-- Structured Data -->
    <script type="application/ld+json" id="schemaData"></script>
</head>

<body>

    <!-- Global Header -->
    <header class="entry-header" id="globalHeader">
        <div class="entry-header-left">
            <button class="nav-btn-back" id="backToGrid" title="Back to Library">←</button>
            <span class="nav-book-title" id="bookTitle"></span>
        </div>
        <div class="entry-header-right">
            <span class="entry-position" id="entryPosition"></span>
            <button class="nav-btn-contents icon-only" id="readBookIcon" title="Read Full Book">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                </svg>
            </button>
            <button class="nav-btn-contents icon-only" id="contentsTrigger" title="Table of Contents">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="8" y1="6" x2="21" y2="6"></line>
                    <line x1="8" y1="12" x2="21" y2="12"></line>
                    <line x1="8" y1="18" x2="21" y2="18"></line>
                    <line x1="3" y1="6" x2="3.01" y2="6"></line>
                    <line x1="3" y1="12" x2="3.01" y2="12"></line>
                    <line x1="3" y1="18" x2="3.01" y2="18"></line>
                </svg>
            </button>
            <button class="nav-btn icon-only" id="prevEntry" disabled title="Previous Chapter">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <button class="nav-btn icon-only" id="nextEntry" disabled title="Next Chapter">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
        </div>
    </header>

    <!-- Entry View -->
    <div class="entry-view hidden" id="entryView">

        <article class="entry-content" id="entryContent">
            <!-- Loading Skeleton -->
            <div class="skeleton-loading-view">
                <div class="skeleton skeleton-title"></div>
                <div class="skeleton skeleton-text" style="width: 90%;"></div>
                <div class="skeleton skeleton-text" style="width: 95%;"></div>
                <div class="skeleton skeleton-text" style="width: 85%;"></div>
                <br>
                <div class="skeleton skeleton-text" style="width: 92%;"></div>
                <div class="skeleton skeleton-text" style="width: 88%;"></div>
                <div class="skeleton skeleton-text" style="width: 94%;"></div>
            </div>
        </article>

        <footer class="entry-footer">
            <button class="nav-btn nav-prev-footer" id="prevEntryFooter" disabled>← Back</button>
            <button class="nav-btn back-to-grid-footer" id="backToGridFooter">Library</button>
            <button class="nav-btn nav-next-footer" id="nextEntryFooter" disabled>Next →</button>
        </footer>
    </div>

    <!-- Contents Menu Overlay -->
    <div class="contents-overlay hidden" id="contentsOverlay">
        <div class="contents-menu">
            <header class="contents-menu-header">
                <h2>Contents</h2>
                <button class="contents-close" id="contentsClose">×</button>
            </header>
            <nav class="contents-menu-links" id="contentsMenuLinks">
                <!-- Links populated dynamically -->
            </nav>
        </div>
    </div>

    <!-- Content Page View (Introduction, Appendix, Colophon) -->
    <div class="content-page-view hidden" id="contentPageView">
        <header class="content-page-header" style="display: none;">
            <!-- Hidden: using global header -->
        </header>

        <article class="content-page-content" id="contentPageContent">
            <!-- Content rendered here -->
        </article>

        <footer class="content-page-footer hidden" id="contentPageFooter">
            <!-- Dynamic buttons like "Start Reading" here -->
        </footer>
    </div>

    <!-- Reader logic moved to reader.html -->

    <!-- SVG filters for ink rendering -->
    <svg style="position: absolute; width: 0; height: 0;">
        <defs>
            <filter id="ink-filter">
                <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" seed="1" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.3" xChannelSelector="R" yChannelSelector="G"
                    result="displaced" />
                <feComponentTransfer in="displaced" result="darker">
                    <feFuncA type="linear" slope="1.1" />
                </feComponentTransfer>
                <feTurbulence type="turbulence" baseFrequency="2" numOctaves="2" seed="2" result="texture" />
                <feColorMatrix in="texture" type="saturate" values="0" result="graytexture" />
                <feComponentTransfer in="graytexture" result="thresholdTexture">
                    <feFuncA type="discrete" tableValues="0 0.5 0.8 1" />
                </feComponentTransfer>
                <feBlend in="darker" in2="thresholdTexture" mode="multiply" />
            </filter>
        </defs>
    </svg>

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <script>window.PagedConfig = { auto: false };</script>
    <script src="https://unpkg.com/pagedjs/dist/paged.polyfill.js"></script>

    <script type="module" src="js/app.js?v=3"></script>
</body>

</html>
