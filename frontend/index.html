<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexandria Press</title>
    <meta name="description" content="Books only AI can write. Explore a collection of generated works.">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://alexandria.press/">
    <meta property="og:title" content="Alexandria Press">
    <meta property="og:description" content="Books only AI can write. Explore a collection of generated works.">
    <meta property="og:image" content="https://alexandria.press/assets/favicon.png">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://alexandria.press/">
    <meta name="twitter:title" content="Alexandria Press">
    <meta name="twitter:description" content="Books only AI can write. Explore a collection of generated works.">
    <meta name="twitter:image" content="https://alexandria.press/assets/favicon.png">

    <link rel="icon" href="assets/favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400..700;1,400..700&family=Lato:wght@400;700;900&family=Lora:ital,wght@0,400..700;1,400..700&family=IBM+Plex+Sans:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="canonical" href="https://alexandria.press/">
    <link rel="manifest" href="/manifest.json">
</head>

<body>
    <div class="library">
        <header class="library-header">
            <h1 class="library-title">Alexandria</h1>
            <p class="library-tagline">Deep Learning for Humans</p>
            <p class="library-sub-tagline">Made with Anthropic Claude</p>
        </header>

        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Search across all books..."
                autocomplete="off">
            <div id="searchResults" class="search-results hidden"></div>
        </div>

        <main class="library-shelf" id="bookShelf">
            <!-- Books loaded dynamically -->
        </main>

        <footer class="library-footer">
            <p>alexandria.press</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadLibrary();
        });
    </script>
</body>

</html>
